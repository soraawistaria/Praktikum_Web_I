<html>
    <head>
        <title>Formulir Kursus</title>
        <style>
            body {
                margin: 0;
            }
            header {
                margin: 0;
                background-color: skyblue;
                height: 25%;
                text-align: center;
            }
            .atas {
                padding: 10px;
                padding-bottom: 30px;
                background-color: skyblue;
                border: 1px solid black;
            }
                .atas h1 {
                    color: red;
                    font-family: Arial;
                    text-align: center;
                }
            .tengah {
                margin: 0;
                background-color: gray;
                padding: 5px;
                border: 1px solid black;
                padding-bottom: 100px;
                padding-top: 0px;
            } 
            .tengah h2 { font-family: Arial; }
            .bawah {
                background-color: salmon;
                padding: 5px;
                border: 1px solid black;
            }
                .bawah textarea {
                    width: 500px;
                    height: 100px;
                }
        </style>
    </head>
    <body>
        <div class="atas">
            <h1>Pendaftaran Kursus</h1>
        </div>
        <div class="tengah">
            <h2>Data Diri</h2>
            <table border="0">
                <tr>
                    <td style="width: 200px;">Nama</td>
                    <td style="width: 200px;"><input type="text"></td>
                </tr>
                <tr>
                    <td>Nim</td>
                    <td><input type="text" maxlength="12"></td>
                </tr>
                <tr>
                    <td>E-mail</td>
                    <td><input type="email"></td>
                </tr>
                <tr>
                    <td>Tanggal Lahir</td>
                    <td><input type="date"></td>
                </tr>
                <tr>
                    <td style="vertical-align: top;">Jenis Kelamin</td>
                    <td>
                        <input type="radio"> Laki-laki <br>
                        <input type="radio"> Perempuan
                    </td>
                </tr>
                <tr>
                    <td style="vertical-align: top;">Pilih Program Kursus</td>
                    <td>
                        <input type="checkbox"> C# <br>
                        <input type="checkbox"> Java <br>
                        <input type="checkbox"> SQL <br>
                        <input type="checkbox"> HTML dan PHP
                    </td>
                </tr>
                <tr>
                    <td>Pilihan Hari/Jam Kursus</td>
                    <td>
                        <select name="Jadwal">
                            <option value="spagi">Senin - Rabu/09.00 - 11.00</option>
                            <option value="spagi">Kamis - Sabtu/08.00 - 10.00</option>
                        </select>
                    </td>
                </tr>
            </table>
        </div>
        <div class="bawah">
            Komentar Anda <br> 
            <textarea></textarea> <br><br>
            <input type="reset" value="Reset" name="Reset">
            <input type="submit" value="Submit" name="Submit">
            <input type="button" value="Cancel" name="Cancel">
        </div>
    </body>
</html>
