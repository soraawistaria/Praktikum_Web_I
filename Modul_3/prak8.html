<html>
    <head>
        <title>Formulir Kursus</title>
    </head>
    <body>
        <table border="0">
            <tr>
                <td style="width: 200px;">Nama</td>
                <td style="width: 200px;"><input type="text"></td>
            </tr>
            <tr>
                <td>Nim</td>
                <td><input type="text" maxlength="12"></td>
            </tr>
            <tr>
                <td>E-mail</td>
                <td><input type="email"></td>
            </tr>
            <tr>
                <td>Tanggal Lahir</td>
                <td><input type="date"></td>
            </tr>
            <tr>
                <td style="vertical-align: top;">Jenis Kelamin</td>
                <td>
                    <input type="radio"> Laki-laki <br>
                    <input type="radio"> Perempuan
                </td>
            </tr>
            <tr>
                <td style="vertical-align: top;">Pilih Program Kursus</td>
                <td>
                    <input type="checkbox"> C# <br>
                    <input type="checkbox"> Java <br>
                    <input type="checkbox"> SQL <br>
                    <input type="checkbox"> HTML dan PHP
                </td>
            </tr>
            <tr>
                <td>Pilihan Hari/Jam Kursus</td>
                <td>
                    <select name="Jadwal">
                        <option value="spagi">Senin - Rabu/09.00 - 11.00</option>
                        <option value="spagi">Kamis - Sabtu/08.00 - 10.00</option>
                    </select>
                </td>
            </tr>
        </table>
    </body>
</html>
